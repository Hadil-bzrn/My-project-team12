<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MeetSmart</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    .sp-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      opacity: 0;
      animation: fadeIn 0.4s ease forwards;
    }

    .sp-img {
      width: 400px;
      height: auto;
      display: block;
    }

    .sp-bar-track {
      width: 160px;
      height: 3px;
      background: #E2E8F0;
      border-radius: 99px;
      overflow: hidden;
    }

    .sp-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #2ECFBF, #00B8A9);
      border-radius: 99px;
    }

    .sp-ring {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.5);
      width: 260px; height: 260px;
      border-radius: 50%;
      border: 2px solid rgba(0,184,169,0.15);
      animation: ring 2s ease-out infinite;
      pointer-events: none;
    }

    body.out { animation: fadeOut 0.4s ease forwards; }

    @keyframes fadeIn  { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
    @keyframes fadeOut { from { opacity:1; } to { opacity:0; } }
    @keyframes ring {
      0%   { transform: translate(-50%,-50%) scale(0.6); opacity:0.5; }
      100% { transform: translate(-50%,-50%) scale(1.4); opacity:0; }
    }
  </style>
</head>
<body>

<div class="sp-ring"></div>

<div class="sp-wrap">
  <img src="logo.jpg" alt="MeetSmart" class="sp-img"/>
  <div class="sp-bar-track">
    <div class="sp-bar" id="spBar"></div>
  </div>
</div>

<script>
  const bar = document.getElementById('spBar');
  const TOTAL = 2000;
  const STEP  = 30;
  let elapsed = 0;

  const timer = setInterval(() => {
    elapsed += STEP;
    const pct = Math.min((elapsed / TOTAL) * 100, 100);
    bar.style.width = pct + '%';

    if (elapsed >= TOTAL) {
      clearInterval(timer);
      document.body.classList.add('out');
      setTimeout(() => { window.location.href = 'index.html'; }, 400);
    }
  }, STEP);
</script>

</body>
</html>
