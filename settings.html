  <!-- ══════ MAIN ══════ -->
  <main class="app-main">

    <!-- Topbar -->
    <div class="app-topbar st-topbar">
      <button class="sidebar-toggle" id="sidebarToggle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h2 class="st-page-title">Settings</h2>
    </div>

    <!-- Scrollable content -->
    <div class="st-scroll">
      <div class="st-body">

        <!-- ── Meeting Preferences ── -->
        <div class="st-card">
          <h3 class="st-card-title">Meeting Preferences</h3>

          <div class="st-field">
            <label>Default Meeting Duration</label>
            <div class="st-sel-wrap">
              <select id="defDuration">
                <option>30 minutes</option>
                <option>45 minutes</option>
                <option selected>60 minutes</option>
                <option>90 minutes</option>
                <option>2 hours</option>
              </select>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>

          <div class="st-field">
            <label>Auto-transcription</label>
            <div class="st-sel-wrap">
              <select id="autoTranscript">
                <option selected>Enabled</option>
                <option>Disabled</option>
              </select>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>

          <div class="st-field">
            <label>Language</label>
            <div class="st-sel-wrap">
              <select id="language">
                <option selected>English</option>
                <option>French</option>
                <option>Arabic</option>
                <option>Spanish</option>
                <option>German</option>
                <option>Portuguese</option>
              </select>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>
        </div>

        <!-- ── Notifications ── -->
        <div class="st-card">
          <h3 class="st-card-title">Notifications</h3>

          <label class="st-check-row">
            <input type="checkbox" id="chkEmail" checked/>
            <span class="st-checkmark"></span>
            Email notifications for new tasks
          </label>
          <label class="st-check-row">
            <input type="checkbox" id="chkReminder" checked/>
            <span class="st-checkmark"></span>
            Meeting reminders
          </label>
          <label class="st-check-row">
            <input type="checkbox" id="chkWeekly"/>
            <span class="st-checkmark"></span>
            Weekly summary reports
          </label>
          <label class="st-check-row">
            <input type="checkbox" id="chkSummary" checked/>
            <span class="st-checkmark"></span>
            Meeting summary after each call
          </label>
          <label class="st-check-row">
            <input type="checkbox" id="chkTeam"/>
            <span class="st-checkmark"></span>
            Team activity updates
          </label>
        </div>

        <!-- ── AI Settings ── -->
        <div class="st-card">
          <h3 class="st-card-title">AI Settings</h3>

          <div class="st-field">
            <label>Summary Detail Level</label>
            <div class="st-sel-wrap">
              <select id="summaryLevel">
                <option>Brief</option>
                <option selected>Standard</option>
                <option>Detailed</option>
              </select>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>

          <div class="st-field">
            <label>Action Item Detection Sensitivity</label>
            <div class="st-sel-wrap">
              <select id="aiSensitivity">
                <option>Low</option>
                <option selected>Medium</option>
                <option>High</option>
              </select>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>

          <div class="st-field">
            <label>Transcript Speaker Labels</label>
            <div class="st-sel-wrap">
              <select id="speakerLabels">
                <option selected>Enabled</option>
                <option>Disabled</option>
              </select>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>
        </div>

        <!-- ── Account ── -->
        <div class="st-card">
          <h3 class="st-card-title">Account</h3>

          <div class="st-field">
            <label>Full Name</label>
            <input type="text" id="accName" value="Sarah Chen"/>
          </div>
          <div class="st-field">
            <label>Email Address</label>
            <input type="email" id="accEmail" value="sarah@company.com"/>
          </div>
          <div class="st-field">
            <label>Timezone</label>
            <div class="st-sel-wrap">
              <select id="timezone">
                <option selected>UTC+01:00 — Algiers</option>
                <option>UTC+00:00 — London</option>
                <option>UTC-05:00 — New York</option>
                <option>UTC-08:00 — Los Angeles</option>
                <option>UTC+02:00 — Cairo</option>
                <option>UTC+03:00 — Riyadh</option>
              </select>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>
        </div>

        <!-- ── Appearance ── -->
        <div class="st-card">
          <h3 class="st-card-title">Appearance</h3>
          <div class="st-dark-row">
            <div class="st-dark-info">
              <div class="st-dark-label">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                Dark Mode
              </div>
              <div class="st-dark-sub">Switch the interface to a dark theme</div>
            </div>
            <label class="st-toggle" id="darkModeToggle">
              <input type="checkbox" id="darkModeCheck"/>
              <span class="st-slider"></span>
            </label>
          </div>
        </div>

        <!-- ── Save ── -->
        <div class="st-save-row">
          <button class="btn btn-primary st-save-btn" id="saveBtn">
            Save Changes
          </button>
        </div>
      </div></div></main></div></body></html>
